<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Trophy Tracker Pro - Full Profile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --ps-blue: #00439c; --bg: #0a0a0a; --card: #121212; --green: #4caf50; --accent: #00aaff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }

        /* Шапка профиля */
        .header { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        .nav-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .nav-link { color: #888; text-decoration: none; font-size: 13px; text-transform: uppercase; font-weight: bold; cursor: pointer; }
        .nav-link:hover { color: #fff; }
        .nav-link.active { color: var(--green); }

        /* Кнопки управления */
        .top-btn { background: #333; color: #fff; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .top-btn:hover { background: #444; }
        .exit-btn { background: #d32f2f; color: #fff; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* Инфо блок */
        .profile-main { display: flex; justify-content: space-between; align-items: flex-start; }
        .nickname { color: var(--green); font-size: 28px; font-weight: bold; margin-left: 10px; }

        /* Достижения (скрытый по умолчанию раздел) */
        .section-achievements { display: none; background: #111; padding: 20px; border-radius: 10px; margin-top: 15px; border: 1px dashed #444; }
        .ach-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .ach-item { background: #1a1a1a; padding: 8px 15px; border-radius: 6px; display: flex; align-items: center; gap: 10px; color: #888; border: 1px solid #333; font-size: 14px; }
        .ach-item.active { border-color: #ffd700; color: #fff; background: #221f10; }

        /* Соцсети в настройках */
        .link-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid #333; color: #555; display: inline-block; }
        .link-badge.active { border-color: var(--green); color: var(--green); }

        /* Панель настроек */
        .settings-box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
        .input-nick { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; width: 200px; margin-right: 10px; }

        /* Баннер и трофеи */
        .banner { background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--accent); cursor: pointer; position: relative; overflow: hidden; margin-top: 20px; background-size: cover; background-position: center; }
        .banner::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1; }
        .bar { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 10px 0; position: relative; z-index: 2; }
        .fill { height: 100%; background: var(--accent); width: 0%; transition: 1s; }
        
        /* ТОП Игроков */
        #topSection { display: none; background: var(--card); padding: 20px; border-radius: 12px; margin-top: 10px; }
        .top-list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; }

        .t-card { display: flex; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 5px; opacity: 0.5; border: 1px solid transparent; }
        .t-card.won { opacity: 1; border-color: var(--ps-blue); }
        .t-img { width: 50px; height: 50px; margin-right: 15px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header" id="mainHeader">
        <div class="nav-bar">
            <a onclick="showSection('profile')" class="nav-link active" id="nav_profile">Профиль</a>
            <a onclick="showSection('ach')" class="nav-link" id="nav_ach">Достижения</a>
            <a onclick="alert('Карточки: Скоро!')" class="nav-link">Карточки</a>
            <button class="top-btn" onclick="showSection('top')">ТОП</button>
            <button id="logoutBtn" class="exit-btn" style="display:none;" onclick="handleLogout()">Выйти</button>
        </div>

        <div id="profileSection">
            <div class="profile-main">
                <div>
                    <div style="display:flex; align-items:center;">
                        <span style="font-size:30px;">🏆</span>
                        <span class="nickname" id="userName">Гость</span>
                    </div>
                    <p style="color:#555; font-size:12px; margin-left:15px;">Добро пожаловать в Tracker Pro</p>
                </div>
                <div id="authContainer">
                    <button id="authBtn" class="top-btn" style="background:var(--ps-blue)" onclick="handleAuthClick()">Войти</button>
                    <button class="top-btn" style="margin-top:10px; display:block;" onclick="toggleSettings()">⚙️ Настройки</button>
                </div>
            </div>
        </div>

        <div id="achievementsSection" class="section-achievements">
            <h3 style="margin-top:0">Достижения сайта</h3>
            <div class="ach-row">
                <div id="ach_plat" class="ach-item"><span>🏆</span> Первая платина</div>
                <div id="ach_form" class="ach-item"><span>📝</span> Анкета заполнена</div>
            </div>
            <button class="top-btn" style="margin-top:15px;" onclick="showSection('profile')">← Назад</button>
        </div>

        <div id="topSection">
            <h3 style="margin-top:0; color:var(--accent)">ТОП Аккаунтов</h3>
            <div id="topPlayersList">
                <div class="top-list-item"><span>1. bestrigyn</span> <span style="color:var(--green)">Online</span></div>
                <div class="top-list-item" style="color:#666"><span>2. Игрок_2</span> <span>Offline</span></div>
            </div>
            <button class="top-btn" style="margin-top:15px;" onclick="showSection('profile')">← Назад</button>
        </div>

        <div id="settingsPanel" class="settings-box">
            <h4 style="margin-top:0">Настройки</h4>
            <div style="margin-bottom:15px;">
                <small style="color:#666; display:block; margin-bottom:5px;">ИЗМЕНИТЬ НИК:</small>
                <input type="text" id="newNickInput" class="input-nick" placeholder="Никнейм...">
                <button class="top-btn" style="background:var(--ps-blue)" onclick="updateNickname()">ОК</button>
            </div>
            <div style="border-top: 1px solid #222; padding-top:10px;">
                <small style="color:#666; display:block; margin-bottom:10px;">ПОДКЛЮЧЕНИЯ:</small>
                <div id="link_google" class="link-badge">GOOGLE AUTH</div>
            </div>
        </div>
    </div>

    <div id="contentArea">
        <div style="text-align: center; margin-bottom: 25px;">
            <label class="top-btn" style="background: var(--green); padding: 10px 20px;">
                📁 Выбрать Update.zip <input type="file" id="fileInput" accept=".zip" hidden>
            </label>
        </div>

        <div class="banner" id="mainBanner">
            <div style="position:relative; z-index:2;">
                <h2 id="gameTitle" style="margin:0">Загрузите данные...</h2>
                <div class="bar"><div id="progressFill" class="fill"></div></div>
                <span id="statText" style="font-size:14px; opacity:0.8">0% — Трофеи: 0/0</span>
            </div>
        </div>

        <div id="trophyList" style="margin-top:20px; display:none; flex-direction:column; gap:10px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
        authDomain: "bestrigyn-1d1c5.firebaseapp.com",
        projectId: "bestrigyn-1d1c5",
        storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
        messagingSenderId: "967145662050",
        appId: "1:967145662050:web:c03ed7463c51105d7bd33b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let userUid = null;

    // Навигация между секциями
    window.showSection = (name) => {
        const sections = ['profileSection', 'achievementsSection', 'topSection', 'contentArea'];
        sections.forEach(s => document.getElementById(s).style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

        if(name === 'profile') {
            document.getElementById('profileSection').style.display = 'block';
            document.getElementById('contentArea').style.display = 'block';
            document.getElementById('nav_profile').classList.add('active');
        } else if(name === 'ach') {
            document.getElementById('achievementsSection').style.display = 'block';
            document.getElementById('nav_ach').classList.add('active');
        } else if(name === 'top') {
            document.getElementById('topSection').style.display = 'block';
        }
    };

    window.handleAuthClick = () => signInWithPopup(auth, new GoogleAuthProvider());
    window.handleLogout = () => signOut(auth).then(() => location.reload());

    window.toggleSettings = () => {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };

    window.updateNickname = async () => {
        const val = document.getElementById('newNickInput').value;
        if (val && userUid) {
            await setDoc(doc(db, "users", userUid), { customName: val }, { merge: true });
            document.getElementById('userName').innerText = val;
            toggleSettings();
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUid = user.uid;
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('link_google').classList.add('active');
            document.getElementById('ach_form').classList.add('active');
            
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists() && snap.data().customName) {
                document.getElementById('userName').innerText = snap.data().customName;
            } else {
                document.getElementById('userName').innerText = user.displayName;
            }
            loadData();
        }
    });

    // Логика работы с ZIP и данными остается прежней
    const openDB = () => new Promise(res => {
        const req = indexedDB.open("TrophyCache", 1);
        req.onupgradeneeded = () => req.result.createObjectStore("images");
        req.onsuccess = () => res(req.result);
    });

    async function loadData() {
        const snap = await getDoc(doc(db, "users", userUid));
        if (snap.exists()) {
            const d = snap.data();
            const idb = await openDB();
            const cachedIcon = await new Promise(r => {
                const req = idb.transaction("images").objectStore("images").get("main_icon");
                req.onsuccess = () => r(req.result);
            });
            const cachedHtml = await new Promise(r => {
                const req = idb.transaction("images").objectStore("images").get("html_list");
                req.onsuccess = () => r(req.result);
            });
            updateUI(d.game, d.perc, d.stat, cachedIcon, cachedHtml);
        }
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !userUid) return;
        const zip = await JSZip.loadAsync(file);
        let xmlData = null, icons = {};

        for (let path in zip.files) {
            const name = path.split('/').pop().toUpperCase();
            if (name === 'TROP.XML') xmlData = await zip.files[path].async("string");
            if (name.endsWith('.PNG')) icons[name] = "data:image/png;base64," + await zip.files[path].async("base64");
        }

        if (xmlData) {
            const xml = new DOMParser().parseFromString(xmlData, "text/xml");
            const trophies = xml.querySelectorAll('trophy');
            let earned = 0, html = '';
            trophies.forEach(t => {
                const won = t.getAttribute('unlockstate') === "true";
                if (won) earned++;
                const img = icons['TROP' + String(t.getAttribute('id')).padStart(3, '0') + '.PNG'] || "";
                html += `<div class="t-card ${won ? 'won' : ''}"><img src="${img}" class="t-img"><div class="t-info"><b>${t.querySelector('name').textContent}</b><small>${t.querySelector('detail').textContent}</small></div></div>`;
            });
            const p = Math.round((earned / trophies.length) * 100);
            const st = `${earned}/${trophies.length}`;
            const gameName = xml.querySelector('title-name')?.textContent || "Game";
            const mainIcon = icons['TROP000.PNG'] || "";
            const idb = await openDB();
            idb.transaction("images", "readwrite").objectStore("images").put(mainIcon, "main_icon");
            idb.transaction("images", "readwrite").objectStore("images").put(html, "html_list");
            await setDoc(doc(db, "users", userUid), { game: gameName, perc: p, stat: st }, { merge: true });
            updateUI(gameName, p, st, mainIcon, html);
        }
    });

    function updateUI(title, p, st, img, html) {
        document.getElementById('gameTitle').innerText = title;
        document.getElementById('progressFill').style.width = p + "%";
        document.getElementById('statText').innerText = `${p}% — Трофеи: ${st}`;
        if (img) document.getElementById('mainBanner').style.backgroundImage = `url(${img})`;
        document.getElementById('trophyList').innerHTML = html || "";
        if (p === 100) document.getElementById('ach_plat').classList.add('active');
    }

    document.getElementById('mainBanner').onclick = () => {
        const list = document.getElementById('trophyList');
        list.style.display = list.style.display === 'flex' ? 'none' : 'flex';
    };
</script>
</body>
</html>
