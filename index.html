<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Trophy Tracker Pro - Bestrigyn Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --ps-blue: #00439c; --bg: #0a0a0a; --card: #121212; --green: #4caf50; --accent: #00aaff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }

        /* Логотип на чистом HTML/CSS */
        .logo-b {
            width: 40px;
            height: 40px;
            background: var(--ps-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.4);
            border: 2px solid var(--accent);
            user-select: none;
        }

        .header { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        
        /* Верхняя панель с лого и навигацией */
        .top-nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        
        .nav-link { color: #888; text-decoration: none; font-size: 13px; text-transform: uppercase; font-weight: bold; cursor: pointer; }
        .nav-link:hover { color: #fff; }
        .nav-link.active { color: var(--green); }

        .top-btn { background: #333; color: #fff; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .exit-btn { background: #d32f2f; color: #fff; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }

        .section-box { display: none; background: #111; padding: 20px; border-radius: 10px; margin-top: 15px; border: 1px solid #333; }
        .ach-item { background: #1a1a1a; padding: 8px 15px; border-radius: 6px; display: flex; align-items: center; gap: 10px; color: #888; border: 1px solid #333; font-size: 14px; }
        .ach-item.active { border-color: #ffd700; color: #fff; background: #221f10; }

        .settings-box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
        .banner { background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--accent); cursor: pointer; position: relative; overflow: hidden; margin-top: 20px; background-size: cover; background-position: center; }
        .banner::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1; }
        
        .top-player-card { display: flex; justify-content: space-between; padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 8px; border: 1px solid #222; }
        .t-card { display: flex; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 5px; opacity: 0.5; border: 1px solid transparent; }
        .t-card.won { opacity: 1; border-color: var(--ps-blue); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="top-nav-row">
            <div class="logo-b">B</div>
            
            <div class="nav-links">
                <a onclick="showSection('profile')" class="nav-link active" id="nav_profile">Профиль</a>
                <a onclick="showSection('ach')" class="nav-link" id="nav_ach">Достижения</a>
                <button class="top-btn" onclick="showSection('top')">ТОП</button>
                <button id="logoutBtn" class="exit-btn" style="display:none;" onclick="handleLogout()">Выйти</button>
            </div>
        </div>

        <div id="profileSection">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span id="userName" style="color:var(--green); font-size:28px; font-weight:bold;">Гость</span>
                </div>
                <div>
                    <button id="authBtn" class="top-btn" style="background:var(--ps-blue)" onclick="handleAuthClick()">Войти</button>
                    <button class="top-btn" style="margin-left:10px;" onclick="toggleSettings()">⚙️ Настройки</button>
                </div>
            </div>
        </div>

        <div id="achievementsSection" class="section-box">
            <h3 style="margin-top:0">Достижения сайта</h3>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <div id="ach_plat" class="ach-item"><span>🏆</span> Первая платина</div>
                <div id="ach_form" class="ach-item"><span>📝</span> Анкета заполнена</div>
            </div>
            <button class="top-btn" style="margin-top:15px;" onclick="showSection('profile')">← Назад</button>
        </div>

        <div id="topSection" class="section-box">
            <h3 style="margin-top:0; color:var(--accent)">ТОП Игроков</h3>
            <div id="topPlayersList">Загрузка...</div>
            <button class="top-btn" style="margin-top:15px;" onclick="showSection('profile')">← Назад</button>
        </div>

        <div id="settingsPanel" class="settings-box">
            <h4 style="margin-top:0">Настройки профиля</h4>
            <div style="margin-bottom: 15px;">
                <input type="text" id="newNickInput" style="background:#222; border:1px solid #444; color:#fff; padding:8px; border-radius:4px; width:60%;" placeholder="Новый ник...">
                <button class="top-btn" style="background:var(--ps-blue)" onclick="updateNickname()">Сохранить</button>
            </div>
            <div style="border-top:1px solid #222; padding-top:10px;">
                <small style="color:#666">Пол:</small>
                <div style="display:flex; gap:15px; margin-top:10px;">
                    <div onclick="setGender('man')" style="cursor:pointer; position:relative;">
                        <img src="human%20gender/man.png" onerror="this.src='trophies_shadPS4/human%20gender/man.png'" style="width:40px; border-radius:4px;">
                        <span id="check_man" style="display:none; position:absolute; top:-5px; right:-5px; background:var(--green); border-radius:50%; width:14px; height:14px; font-size:10px; text-align:center;">✓</span>
                    </div>
                    <div onclick="setGender('woman')" style="cursor:pointer; position:relative;">
                        <img src="human%20gender/woman.png" onerror="this.src='trophies_shadPS4/human%20gender/woman.png'" style="width:40px; border-radius:4px;">
                        <span id="check_woman" style="display:none; position:absolute; top:-5px; right:-5px; background:var(--green); border-radius:50%; width:14px; height:14px; font-size:10px; text-align:center;">✓</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="downloadArea" style="text-align:center; margin-bottom:20px;">
        <label class="top-btn" style="background: var(--green); padding: 10px 20px; display:inline-block; cursor:pointer;">
            📁 Выбрать Update.zip <input type="file" id="fileInput" accept=".zip" hidden>
        </label>
    </div>

    <div id="contentArea">
        <div class="banner" id="mainBanner" onclick="toggleTrophies()">
            <div style="position:relative; z-index:2;">
                <h2 id="gameTitle" style="margin:0">Данные не загружены</h2>
                <div style="width:100%; height:8px; background:#222; border-radius:4px; margin:10px 0;">
                    <div id="progressFill" style="height:100%; background:var(--accent); width:0%; transition:1s;"></div>
                </div>
                <span id="statText" style="font-size:14px; opacity:0.8">0% — 0/0</span>
            </div>
        </div>
        <div id="trophyList" style="margin-top:20px; display:none; flex-direction:column; gap:8px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
        authDomain: "bestrigyn-1d1c5.firebaseapp.com",
        projectId: "bestrigyn-1d1c5",
        storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
        messagingSenderId: "967145662050",
        appId: "1:967145662050:web:c03ed7463c51105d7bd33b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let userUid = null;

    // Исправлено: закрываем всё лишнее при переключении
    window.showSection = (name) => {
        const sections = ['profileSection', 'achievementsSection', 'topSection', 'contentArea', 'downloadArea', 'settingsPanel'];
        sections.forEach(s => document.getElementById(s).style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

        if(name === 'profile') {
            document.getElementById('profileSection').style.display = 'block';
            document.getElementById('contentArea').style.display = 'block';
            document.getElementById('downloadArea').style.display = 'block';
            document.getElementById('nav_profile').classList.add('active');
        } else if(name === 'ach') {
            document.getElementById('achievementsSection').style.display = 'block';
            document.getElementById('nav_ach').classList.add('active');
        } else if(name === 'top') {
            document.getElementById('topSection').style.display = 'block';
            loadTopPlayers();
        }
    };

    window.toggleSettings = () => {
        const s = document.getElementById('settingsPanel');
        const t = document.getElementById('topSection');
        if (s.style.display === 'none' || s.style.display === '') {
            if(t) t.style.display = 'none'; // Убираем ТОП, если открываем настройки
            s.style.display = 'block';
        } else s.style.display = 'none';
    };

    async function loadTopPlayers() {
        const list = document.getElementById('topPlayersList');
        list.innerHTML = "Загрузка игроков...";
        const q = query(collection(db, "users"), limit(20));
        const snap = await getDocs(q);
        let h = '';
        snap.forEach(d => {
            const data = d.data();
            h += `<div class="top-player-card"><b>${data.customName || data.displayName || 'Игрок'}</b> <span>${data.game || '-'} (${data.perc || 0}%)</span></div>`;
        });
        list.innerHTML = h || "Никого нет";
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUid = user.uid;
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('userName').innerText = user.displayName;

            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                const d = snap.data();
                if (d.customName) document.getElementById('userName').innerText = d.customName;
                if (d.gender) updateGenderUI(d.gender);
            }
        }
    });

    window.updateNickname = async () => {
        const val = document.getElementById('newNickInput').value;
        if (val && userUid) {
            await setDoc(doc(db, "users", userUid), { customName: val }, { merge: true });
            document.getElementById('userName').innerText = val;
            document.getElementById('settingsPanel').style.display = 'none';
        }
    };

    window.setGender = async (g) => {
        if(userUid) {
            await setDoc(doc(db, "users", userUid), { gender: g }, { merge: true });
            updateGenderUI(g);
        }
    };

    function updateGenderUI(g) {
        document.getElementById('check_man').style.display = g === 'man' ? 'block' : 'none';
        document.getElementById('check_woman').style.display = g === 'woman' ? 'block' : 'none';
    }

    window.handleAuthClick = () => signInWithPopup(auth, new GoogleAuthProvider());
    window.handleLogout = () => signOut(auth).then(() => location.reload());
    window.toggleTrophies = () => {
        const l = document.getElementById('trophyList');
        l.style.display = l.style.display === 'flex' ? 'none' : 'flex';
    };
</script>
</body>
</html>
