<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trophy Tracker shadps4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --ps-blue: #00439c; --ps-light-blue: #00aaff; --bg-dark: #0a0a0a; --card-bg: #151515; --text-main: #ffffff; --text-dim: #999; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px; }
        .login-btn { background: #db4437; color: white; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        
        .upload-zone { text-align: center; margin-bottom: 40px; }
        .btn-upload { background: var(--ps-blue); color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; transition: 0.3s; }
        .btn-upload:hover { background: var(--ps-light-blue); }
        #fileInput { display: none; }
        
        .game-banner { background: var(--card-bg); width: 100%; max-width: 1000px; margin: 0 auto; border-radius: 12px; padding: 20px; display: flex; gap: 20px; align-items: center; cursor: pointer; transition: 0.2s; border: 1px solid #222; box-sizing: border-box; }
        .game-banner:hover { border-color: var(--ps-light-blue); background: #1c1c1c; }
        .game-icon { width: 100px; height: 100px; border-radius: 8px; object-fit: cover; background: #333; flex-shrink: 0; }
        
        .game-info-main { flex-grow: 1; }
        .game-title-row { display: flex; justify-content: space-between; align-items: center; }
        .ps4-tag { background: #003791; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        .progress-line-container { width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-line-fill { height: 100%; background: linear-gradient(90deg, var(--ps-blue), var(--ps-light-blue)); width: 0%; transition: 1s ease-out; }

        #trophySection { max-width: 1000px; margin: 10px auto; display: none; }
        .trophy-row { background: #1a1a1a; margin-bottom: 4px; padding: 12px 20px; display: flex; align-items: center; gap: 20px; border-radius: 6px; }
        .unlocked { border-left: 4px solid #4caf50; background: #1e251e; }
        .t-icon { width: 48px; height: 48px; border-radius: 4px; flex-shrink: 0; }
        .t-locked { filter: grayscale(1); opacity: 0.2; }
        .t-type { font-weight: bold; width: 25px; text-align: center; }
        .type-B { color: #cd7f32; } .type-S { color: #c0c0c0; } .type-G { color: #ffd700; } .type-P { color: #40e0d0; }
        .t-details h4 { margin: 0; font-size: 15px; }
        .t-details p { margin: 3px 0 0; font-size: 12px; color: var(--text-dim); }
    </style>
</head>
<body>

    <div class="top-nav">
        <h2>Trophy Tracker shadps4</h2>
        <button id="authBtn" class="login-btn" onclick="loginWithGoogle()">Войти через Google</button>
    </div>

    <div class="upload-zone">
        <label for="fileInput" class="btn-upload">Загрузить Update.zip</label>
        <input type="file" id="fileInput" accept=".zip">
    </div>

    <div id="mainContent"></div>
    <div id="trophySection"></div>

    <script type="module">
        // 1. Подключаем Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 2. ТВОИ РЕАЛЬНЫЕ КЛЮЧИ (САМ ВСТАВИЛ)
        const firebaseConfig = {
            apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
            authDomain: "bestrigyn-1d1c5.firebaseapp.com",
            projectId: "bestrigyn-1d1c5",
            storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
            messagingSenderId: "967145662050",
            appId: "1:967145662050:web:c03ed7463c51105d7bd33b",
            measurementId: "G-7PXF63DKVX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 3. ФУНКЦИЯ ВХОДА (ВЫНЕСЕНА ДЛЯ КНОПКИ)
        window.loginWithGoogle = function() {
            console.log("Попытка входа через Google...");
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("Успешно зашли:", result.user.displayName);
                })
                .catch((error) => {
                    console.error("Ошибка Firebase:", error.code, error.message);
                    alert("Ошибка входа! Проверь 'Authorized domains' в Firebase.");
                });
        };

        // Следим за пользователем
        onAuthStateChanged(auth, (user) => {
            const authBtn = document.getElementById('authBtn');
            if (user) {
                authBtn.innerText = user.displayName;
                authBtn.style.background = "#4caf50";
            } else {
                authBtn.innerText = "Войти через Google";
                authBtn.style.background = "#db4437";
            }
        });

        // 4. ЛОГИКА ТРОФЕЕВ
        window.toggleTrophies = function() {
            const section = document.getElementById('trophySection');
            if (section) {
                section.style.display = (section.style.display === 'block') ? 'none' : 'block';
            }
        };

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const zip = await JSZip.loadAsync(file);
            let tropXml = null, tIcons = {};

            for (let path in zip.files) {
                const entry = zip.files[path];
                if (path.toLowerCase().endsWith('trop.xml')) {
                    tropXml = await entry.async("string");
                }
                if (path.toLowerCase().endsWith('.png')) {
                    const blob = await entry.async("blob");
                    const name = path.split('/').pop().toUpperCase();
                    tIcons[name] = URL.createObjectURL(blob);
                }
            }

            if (tropXml) renderGame(tropXml, tIcons);
        });

        function renderGame(xmlStr, icons) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlStr, "text/xml");
            const title = xml.querySelector('title-name')?.textContent || "Игра";
            const trophies = xml.querySelectorAll('trophy');
            let unlocked = 0, trophyHtml = '';

            trophies.forEach(t => {
                const id = t.getAttribute('id');
                const isWin = t.getAttribute('unlockstate') === "true";
                if (isWin) unlocked++;
                const tIcon = icons[`TROP${id}.PNG`] || "";
                trophyHtml += `
                    <div class="trophy-row ${isWin ? 'unlocked' : ''}">
                        <img src="${tIcon}" class="t-icon ${isWin ? '' : 't-locked'}">
                        <div class="t-type type-${t.getAttribute('ttype')}">${t.getAttribute('ttype')}</div>
                        <div class="t-details">
                            <h4>${t.querySelector('name').textContent}</h4>
                            <p>${t.querySelector('detail').textContent}</p>
                        </div>
                    </div>`;
            });

            const percent = Math.round((unlocked / trophies.length) * 100);
            
            // ИКОНКА ИЗ ТВОЕЙ ПОДСКАЗКИ: TROP000.PNG
            const gameCover = icons['TROP000.PNG'] || icons['ICON0.PNG'] || "https://via.placeholder.com/100?text=PS";

            document.getElementById('mainContent').innerHTML = `
                <div class="game-banner" onclick="toggleTrophies()">
                    <img src="${gameCover}" class="game-icon">
                    <div class="game-info-main">
                        <div class="game-title-row">
                            <h3>${title}</h3>
                            <div class="ps4-tag">PS4</div>
                        </div>
                        <div class="game-stats-row">
                            <strong>${percent}%</strong> • <span style="color:var(--text-dim)">Трофеи: ${unlocked} / ${trophies.length}</span>
                        </div>
                        <div class="progress-line-container">
                            <div class="progress-line-fill" style="width: ${percent}%"></div>
                        </div>
                        <small style="color:var(--ps-light-blue)">Кликни на плашку, чтобы развернуть список</small>
                    </div>
                </div>`;
            document.getElementById('trophySection').innerHTML = trophyHtml;
            document.getElementById('trophySection').style.display = 'none';
        }
    </script>
</body>
</html>
