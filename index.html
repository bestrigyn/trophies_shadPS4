 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trophy Tracker shadps4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --ps-blue: #00439c;
            --ps-light-blue: #00aaff;
            --bg-dark: #0a0a0a;
            --card-bg: #151515;
            --text-main: #ffffff;
            --text-dim: #999;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* Шапка с логином */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 30px;
        }

        .login-placeholder {
            background: #db4437;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        /* Кнопка загрузки */
        .upload-zone {
            text-align: center;
            margin-bottom: 40px;
        }
        .btn-upload {
            background: var(--ps-blue);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
        }

        #fileInput { display: none; }

        /* ПАНЕЛЬ ИГРЫ (Кликабельная) */
        .game-banner {
            background: var(--card-bg);
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            position: relative;
            border: 1px solid #222;
        }
        .game-banner:hover {
            background: #1c1c1c;
            transform: scale(1.01);
        }

        .game-icon {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            background: #333;
        }

        .game-info-main { flex-grow: 1; }
        .game-title-row { display: flex; justify-content: space-between; align-items: center; }
        
        .ps4-tag {
            background: #003791;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .progress-line-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin: 15px 0;
        }
        .progress-line-fill {
            height: 100%;
            background: var(--ps-light-blue);
            width: 0%;
            transition: 1s;
        }

        /* СПИСОК ТРОФЕЕВ (Изначально скрыт) */
        #trophySection {
            max-width: 1000px;
            margin: 20px auto;
            display: none; /* Скрыто */
        }

        .trophy-row {
            background: #1a1a1a;
            margin-bottom: 5px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-radius: 4px;
        }

        .t-icon { width: 50px; height: 50px; border-radius: 4px; }
        .t-locked { filter: grayscale(1); opacity: 0.3; }

        .t-type { font-weight: bold; width: 20px; }
        .type-B { color: #cd7f32; }
        .type-S { color: #c0c0c0; }
        .type-G { color: #ffd700; }
        .type-P { color: #40e0d0; }

        .t-details h4 { margin: 0; font-size: 16px; }
        .t-details p { margin: 5px 0 0; font-size: 13px; color: var(--text-dim); }

    </style>
</head>
<body>

    <div class="top-nav">
        <h2>Trophy Tracker shadps4</h2>
        <button class="login-placeholder">Войти через Google</button>
    </div>

    <div class="upload-zone">
        <label for="fileInput" class="btn-upload">Загрузить Update.zip</label>
        <input type="file" id="fileInput" accept=".zip">
    </div>

    <div id="mainContent"></div>
    <div id="trophySection"></div>

    <script>
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const zip = await JSZip.loadAsync(file);
            let tropXml = null;
            let gameIcon = null;
            let tIcons = {};

            // Улучшенный поиск файлов
            for (let path in zip.files) {
                const entry = zip.files[path];
                if (path.toLowerCase().endsWith('trop.xml')) {
                    tropXml = await entry.async("string");
                }
                if (path.toLowerCase().endsWith('icon0.png')) {
                    const blob = await entry.async("blob");
                    gameIcon = URL.createObjectURL(blob);
                }
                if (path.includes('/Icons/') && path.toLowerCase().endsWith('.png')) {
                    const blob = await entry.async("blob");
                    const name = path.split('/').pop().toUpperCase();
                    tIcons[name] = URL.createObjectURL(blob);
                }
            }

            if (tropXml) {
                renderGame(tropXml, gameIcon, tIcons);
            }
        });

        function renderGame(xmlStr, icon, icons) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlStr, "text/xml");
            const title = xml.querySelector('title-name')?.textContent || "Game";
            const trophies = xml.querySelectorAll('trophy');
            let unlocked = 0;

            let trophyHtml = '';
            trophies.forEach(t => {
                const id = t.getAttribute('id');
                const isWin = t.getAttribute('unlockstate') === "true";
                const type = t.getAttribute('ttype');
                const name = t.querySelector('name').textContent;
                const desc = t.querySelector('detail').textContent;
                if (isWin) unlocked++;

                const tIcon = icons[`TROP${id}.PNG`] || "";

                trophyHtml += `
                    <div class="trophy-row">
                        <img src="${tIcon}" class="t-icon ${isWin ? '' : 't-locked'}">
                        <div class="t-type type-${type}">${type}</div>
                        <div class="t-details">
                            <h4>${name}</h4>
                            <p>${desc}</p>
                        </div>
                    </div>
                `;
            });

            const percent = Math.round((unlocked / trophies.length) * 100);

            document.getElementById('mainContent').innerHTML = `
                <div class="game-banner" onclick="document.getElementById('trophySection').style.display='block'">
                    <img src="${icon || ''}" class="game-icon">
                    <div class="game-info-main">
                        <div class="game-title-row">
                            <h3>${title}</h3>
                            <div class="ps4-tag">PS4</div>
                        </div>
                        <div class="game-stats-row">
                            <span>${percent}%</span> • <span>Трофеи: ${unlocked} / ${trophies.length}</span>
                        </div>
                        <div class="progress-line-container">
                            <div class="progress-line-fill" style="width: ${percent}%"></div>
                        </div>
                        <small style="color:var(--text-dim)">Нажми, чтобы открыть список</small>
                    </div>
                </div>
            `;
            document.getElementById('trophySection').innerHTML = trophyHtml;
        }
    </script>
</body>
</html>
