<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trophy Tracker shadps4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --ps-blue: #00439c; --ps-light-blue: #00aaff; --bg-dark: #0a0a0a; --card-bg: #151515; --text-main: #ffffff; --text-dim: #999; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px; position: relative; }
        
        /* КНОПКА ВХОДА И МЕНЮ ВЫХОДА */
        .auth-container { position: relative; }
        .login-btn { background: #db4437; color: white; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; font-weight: bold; }
        .logout-menu { display: none; position: absolute; top: 45px; right: 0; background: #222; border: 1px solid #444; border-radius: 4px; padding: 5px; z-index: 100; }
        .logout-btn { background: #444; color: white; border: none; padding: 8px 15px; cursor: pointer; width: 100%; border-radius: 3px; }
        .logout-btn:hover { background: #666; }

        .upload-zone { text-align: center; margin-bottom: 40px; }
        .btn-upload { background: var(--ps-blue); color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; }
        #fileInput { display: none; }
        
        .game-banner { background: var(--card-bg); width: 100%; max-width: 1000px; margin: 0 auto; border-radius: 12px; padding: 20px; display: flex; gap: 20px; align-items: center; cursor: pointer; border: 1px solid #222; box-sizing: border-box; }
        .game-icon { width: 100px; height: 100px; border-radius: 8px; object-fit: cover; background: #333; flex-shrink: 0; }
        .game-info-main { flex-grow: 1; }
        .ps4-tag { background: #003791; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .progress-line-container { width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-line-fill { height: 100%; background: linear-gradient(90deg, var(--ps-blue), var(--ps-light-blue)); width: 0%; transition: 1s ease-out; }

        #trophySection { max-width: 1000px; margin: 10px auto; display: none; }
        .trophy-row { background: #1a1a1a; margin-bottom: 4px; padding: 12px 20px; display: flex; align-items: center; gap: 20px; border-radius: 6px; }
        .unlocked { border-left: 4px solid #4caf50; background: #1e251e; }
        .t-icon { width: 48px; height: 48px; border-radius: 4px; flex-shrink: 0; }
        .t-locked { filter: grayscale(1); opacity: 0.2; }
    </style>
</head>
<body>

    <div class="top-nav">
        <h2>Trophy Tracker shadps4</h2>
        <div class="auth-container">
            <button id="authBtn" class="login-btn" onclick="handleAuthClick()">Войти через Google</button>
            <div id="logoutMenu" class="logout-menu">
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
    </div>

    <div class="upload-zone">
        <label for="fileInput" class="btn-upload">Загрузить Update.zip</label>
        <input type="file" id="fileInput" accept=".zip">
    </div>

    <div id="mainContent"></div>
    <div id="trophySection"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
            authDomain: "bestrigyn-1d1c5.firebaseapp.com",
            projectId: "bestrigyn-1d1c5",
            storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
            messagingSenderId: "967145662050",
            appId: "1:967145662050:web:c03ed7463c51105d7bd33b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // --- ЛОГИКА АВТОРИЗАЦИИ ---
        window.handleAuthClick = function() {
            if (currentUser) {
                const menu = document.getElementById('logoutMenu');
                menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            } else {
                signInWithPopup(auth, new GoogleAuthProvider());
            }
        };

        window.logout = () => {
            signOut(auth);
            location.reload();
        };

        onAuthStateChanged(auth, async (user) => {
            const authBtn = document.getElementById('authBtn');
            if (user) {
                currentUser = user;
                authBtn.innerText = user.displayName;
                authBtn.style.background = "#4caf50";
                loadSavedData(); // Пробуем загрузить сохранения при входе
            } else {
                currentUser = null;
                authBtn.innerText = "Войти через Google";
            }
        });

        // --- СОХРАНЕНИЕ И ЗАГРУЗКА ---
        async function saveData(title, percent, unlockedCount, totalCount) {
            if (!currentUser) return;
            await setDoc(doc(db, "saves", currentUser.uid), {
                title, percent, unlockedCount, totalCount,
                timestamp: Date.now()
            });
            console.log("Прогресс сохранен в облако!");
        }

        async function loadSavedData() {
            if (!currentUser) return;
            const docSnap = await getDoc(doc(db, "saves", currentUser.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                renderPlaceholder(data);
            }
        }

        function renderPlaceholder(data) {
            document.getElementById('mainContent').innerHTML = `
                <div class="game-banner">
                    <div class="game-icon" style="display:flex;align-items:center;justify-content:center;color:#555">🎮</div>
                    <div class="game-info-main">
                        <h3>${data.title} (Загружено)</h3>
                        <strong>${data.percent}%</strong> • Трофеи: ${data.unlockedCount} / ${data.totalCount}
                        <div class="progress-line-container"><div class="progress-line-fill" style="width:${data.percent}%"></div></div>
                        <small>Загрузите ZIP снова, чтобы увидеть детальный список трофеев</small>
                    </div>
                </div>`;
        }

        // --- ПАРСИНГ ZIP ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const zip = await JSZip.loadAsync(file);
            let tropXml = null, tIcons = {};
            for (let path in zip.files) {
                const entry = zip.files[path];
                if (path.toLowerCase().endsWith('trop.xml')) tropXml = await entry.async("string");
                if (path.toLowerCase().endsWith('.png')) {
                    const blob = await entry.async("blob");
                    tIcons[path.split('/').pop().toUpperCase()] = URL.createObjectURL(blob);
                }
            }
            if (tropXml) renderGame(tropXml, tIcons);
        });

        window.toggleTrophies = () => {
            const s = document.getElementById('trophySection');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        };

        function renderGame(xmlStr, icons) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlStr, "text/xml");
            const title = xml.querySelector('title-name')?.textContent || "Game";
            const trophies = xml.querySelectorAll('trophy');
            let unlocked = 0, trophyHtml = '';

            trophies.forEach(t => {
                const id = t.getAttribute('id');
                const isWin = t.getAttribute('unlockstate') === "true";
                if (isWin) unlocked++;
                const tIcon = icons[`TROP${id}.PNG`] || "";
                trophyHtml += `<div class="trophy-row ${isWin ? 'unlocked' : ''}">
                    <img src="${tIcon}" class="t-icon ${isWin ? '' : 't-locked'}">
                    <div class="t-details"><h4>${t.querySelector('name').textContent}</h4><p>${t.querySelector('detail').textContent}</p></div>
                </div>`;
            });

            const percent = Math.round((unlocked / trophies.length) * 100);
            document.getElementById('mainContent').innerHTML = `
                <div class="game-banner" onclick="toggleTrophies()">
                    <img src="${icons['TROP000.PNG'] || ''}" class="game-icon">
                    <div class="game-info-main">
                        <h3>${title}</h3>
                        <div class="progress-line-container"><div class="progress-line-fill" style="width:${percent}%"></div></div>
                        <strong>${percent}%</strong> — Нажми для списка
                    </div>
                </div>`;
            document.getElementById('trophySection').innerHTML = trophyHtml;
            saveData(title, percent, unlocked, trophies.length); // Сохраняем при каждом парсинге
        }
    </script>
</body>
</html>
