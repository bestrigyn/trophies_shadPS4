 <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
        authDomain: "bestrigyn-1d1c5.firebaseapp.com",
        projectId: "bestrigyn-1d1c5",
        storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
        messagingSenderId: "967145662050",
        appId: "1:967145662050:web:c03ed7463c51105d7bd33b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let userUid = null;

    window.handleAuthClick = () => signInWithPopup(auth, new GoogleAuthProvider());

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userUid = user.uid;
            document.getElementById('authBtn').innerText = "Аккаунт: " + user.displayName;
            console.log("Авторизован как:", user.displayName, "UID:", userUid);
            loadData();
        }
    });

    async function loadData() {
        if (!userUid) return;
        try {
            const snap = await getDoc(doc(db, "users", userUid));
            if (snap.exists()) {
                const d = snap.data();
                console.log("Данные успешно загружены из облака для игры:", d.game);
                renderUI(d.game, d.perc, d.stat, d.imgBase64, d.fullHtml);
            } else {
                console.log("В облаке пока нет записей для этого пользователя.");
            }
        } catch (e) {
            console.error("Ошибка при чтении данных:", e);
        }
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!userUid) {
            alert("Сначала нажми кнопку 'Войти'!");
            return;
        }

        const zip = await JSZip.loadAsync(file);
        let xml = null, icons = {}, mainIconBase64 = "";

        for (let p in zip.files) {
            if (p.toLowerCase().endsWith('trop.xml')) xml = await zip.files[p].async("string");
            if (p.toLowerCase().endsWith('.png')) {
                const b = await zip.files[p].async("base64");
                const name = p.split('/').pop().toUpperCase();
                icons[name] = "data:image/png;base64," + b;
                if (name === 'TROP000.PNG') mainIconBase64 = icons[name];
            }
        }
        if (xml) processXml(xml, icons, mainIconBase64);
    });

    async function processXml(xmlStr, icons, mainIconBase64) {
        const docXml = new DOMParser().parseFromString(xmlStr, "text/xml");
        const title = docXml.querySelector('title-name')?.textContent || "Game";
        const trops = docXml.querySelectorAll('trophy');
        let win = 0, html = '';

        trops.forEach(t => {
            const isW = t.getAttribute('unlockstate') === "true";
            if (isW) win++;
            const id = 'TROP' + String(t.getAttribute('id')).padStart(3, '0') + '.PNG';
            html += `<div class="trophy-row ${isW ? 'unlocked' : ''}">
                <img src="${icons[id] || ''}" class="t-icon">
                <div><h4 style="margin:0;">${t.querySelector('name').textContent}</h4><p style="margin:5px 0 0; font-size:13px; opacity:0.7;">${t.querySelector('detail').textContent}</p></div>
            </div>`;
        });

        const p = Math.round((win / trops.length) * 100);
        const statStr = `${win}/${trops.length}`;

        // СНАЧАЛА ОТОБРАЖАЕМ НА ЭКРАНЕ (визуальный отклик сразу)
        renderUI(title, p, statStr, mainIconBase64, html);

        // ТЕПЕРЬ СОХРАНЯЕМ В ОБЛАКО
        console.log("Запускаю процесс сохранения...");
        try {
            await setDoc(doc(db, "users", userUid), { 
                game: title, 
                perc: p, 
                stat: statStr, 
                imgBase64: mainIconBase64, 
                fullHtml: html,
                lastUpdate: new Date().getTime()
            }, { merge: false }); // merge: false гарантирует полную перезапись старых данных
            
            console.log("✅ ОБЛАКО ОБНОВЛЕНО!");
            alert("Трофеи успешно сохранены в облаке!");
        } catch (error) {
            console.error("❌ КРИТИЧЕСКАЯ ОШИБКА ЗАПИСИ:", error.code, error.message);
            alert("Ошибка записи! Проверь вкладку Rules в консоли Firebase: " + error.message);
        }
    }

    function renderUI(title, p, stat, icon, html) {
        const mainContent = document.getElementById('mainContent');
        const trophySection = document.getElementById('trophySection');

        mainContent.innerHTML = `
            <div class="game-banner" id="bannerBtn">
                <img src="${icon || 'https://www.playstation.com/content/dam/global_assets/ps-logo.png'}" class="game-icon">
                <div style="flex-grow:1;">
                    <h2 style="margin:0;">${title}</h2>
                    <div class="progress-line-container"><div class="progress-line-fill" style="width:${p}%"></div></div>
                    <strong>${p}% — Трофеи: ${stat}</strong>
                </div>
            </div>`;
        
        trophySection.innerHTML = html;
        document.getElementById('bannerBtn').onclick = () => {
            trophySection.style.display = trophySection.style.display === 'block' ? 'none' : 'block';
        };
    }
</script>
