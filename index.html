<!DOCTYPE html>

    <style>
        /* ========================================================
           БЛОК 1: ВИЗУАЛЬНЫЙ СТИЛЬ (CSS)
           ======================================================== */
        :root { --ps-blue: #00439c; --bg: #0a0a0a; --card: #161616; --green: #4caf50; --accent: #00aaff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { background: var(--card); padding: 15px 25px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .nickname { color: var(--green); font-weight: bold; font-size: 20px; }

        /* СТИЛИ АККАУНТА И ИНФОРМАЦИИ */
        #infoSubMenu { display: none; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; }
        .account-achievements { display: flex; gap: 10px; margin: 15px 0; }
        .ach-item { background: #222; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; opacity: 0.5; font-size: 13px; border: 1px solid #333; }
        .ach-item.active { opacity: 1; border-color: #ffd700; background: #2a2a1a; }

        /* СТИЛИ КАРТИНОК И БАННЕРА */
        .banner { 
            background-color: #111; background-size: cover; background-position: center;
            box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, 0.6); 
            padding: 30px 25px; border-radius: 15px; display: flex; align-items: center; gap: 20px; 
            cursor: pointer; border: 1px solid var(--accent); position: relative; overflow: hidden; transition: 0.3s;
        }
        .game-icon { width: 110px; height: 110px; border-radius: 12px; object-fit: cover; z-index: 2; border: 2px solid rgba(255,255,255,0.2); }
        .t-img { width: 40px; height: 40px; border-radius: 4px; background: #000; }
    </style>
</head>
