<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Trophy Tracker Pro - Bestrigyn</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --ps-blue: #00439c; --bg: #0a0a0a; --card: #161616; --green: #4caf50; --gray: #444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px 25px; border-radius: 12px; border: 1px solid #333; }
        #userName { color: var(--green); font-weight: bold; cursor: pointer; text-decoration: underline; }

        .content-panel { display: none; background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--gray); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input[type="text"], textarea { width: 100%; padding: 10px; background: #222; border: 1px solid var(--gray); color: #fff; border-radius: 5px; box-sizing: border-box; }
        
        .btn { background: var(--ps-blue); color: #fff; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; }
        
        .banner { background: #111; padding: 30px 25px; border-radius: 15px; display: flex; align-items: center; gap: 20px; border: 1px solid #00aaff; background-size: cover; background-position: center; box-shadow: inset 0 0 0 1000px rgba(0,0,0,0.7); min-height: 120px; cursor: pointer; }
        .bar { width: 100%; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; background: #00aaff; width: 0%; transition: 1s; }

        /* Стили для плиток трофеев */
        .trophy-item { 
            background: var(--card); 
            padding: 8px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border: 1px solid #333; 
            position: relative; 
            overflow: hidden; 
        }
        .trophy-icon { width: 40px; height: 40px; border-radius: 4px; transition: 0.3s; }
        .trophy-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; }

        .download-footer { margin-top: 30px; text-align: center; padding: 20px; border-top: 1px solid #333; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span id="userName" onclick="toggleSection('profileSection')">Вход</span>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background:#444" onclick="toggleSection('leaderboardSection')">ТОП</button>
            <button id="authBtn" class="btn" onclick="handleAuthClick()">Войти</button>
            <button id="logoutBtn" class="btn" style="display:none; background:#d32f2f" onclick="handleLogout()">Выйти</button>
        </div>
    </div>

    <div id="leaderboardSection" class="content-panel">
        <h3 style="margin-top:0">🏆 Топ игроков</h3>
        <div id="leaderboardList">Загрузка...</div>
    </div>

    <div id="profileSection" class="content-panel">
        <h3>Настройки профиля</h3>
        <div class="profile-grid">
            <div>
                <label>Ваш ник</label><br>
                <input type="text" id="profNick" placeholder="Никнейм..."><br><br>
                <button class="btn" onclick="saveProfileData()">Сохранить</button>
            </div>
            <div>
                <label>BBCode для форумов</label>
                <textarea id="bbCodeField" rows="3" readonly style="margin-top:10px;">[URL=https://bestrigyn.github.io][IMG]https://bestrigyn.github.io/card.png[/IMG][/URL]</textarea>
            </div>
        </div>
    </div>

    <div style="text-align:center; margin-bottom: 20px;">
        <label class="btn" style="background:#28a745">📂 Выбрать Update.zip <input type="file" id="fileInput" accept=".zip" hidden></label>
    </div>

    <div class="banner" id="mainBanner" onclick="toggleSection('trophyList')">
        <img id="gameIcon" style="width:80px; height:80px; border-radius:10px; display:none; object-fit:cover;">
        <div style="flex-grow:1;">
            <h2 id="gameTitle" style="margin:0">Загрузите данные</h2>
            <div class="bar"><div id="progressFill" class="fill"></div></div>
            <span id="statText">0% — Трофеи: 0/0</span>
        </div>
    </div>

    <div id="trophyList" style="display:none; flex-direction:column; gap:8px; margin-top:20px;"></div>

    <div class="download-footer">
        <a href="https://github.com/bestrigyn/trophies_shadPS4_assistant/releases/tag/ShadPS4_Assistant" class="btn" target="_blank">
            📥 Скачать ShadPS4 Assistant
        </a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
        authDomain: "bestrigyn-1d1c5.firebaseapp.com",
        projectId: "bestrigyn-1d1c5",
        storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
        messagingSenderId: "967145662050",
        appId: "1:967145662050:web:c03ed7463c51105d7bd33b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let userUid = null;

    const openDB = () => new Promise(res => {
        const req = indexedDB.open("TrophyCache", 1);
        req.onupgradeneeded = () => req.result.createObjectStore("images");
        req.onsuccess = () => res(req.result);
    });
    const saveImg = async (id, data) => { (await openDB()).transaction("images", "readwrite").objectStore("images").put(data, id); };
    const getImg = async (id) => {
        const idb = await openDB();
        return new Promise(res => {
            const req = idb.transaction("images").objectStore("images").get(id);
            req.onsuccess = () => res(req.result);
            req.onerror = () => res(null);
        });
    };

    window.handleAuthClick = () => signInWithPopup(auth, new GoogleAuthProvider());
    window.handleLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUid = user.uid;
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
            await loadData();
            await loadLeaderboard();
        }
    });

    window.toggleSection = (id) => {
        ['profileSection', 'leaderboardSection', 'trophyList'].forEach(s => {
            const el = document.getElementById(s);
            if(s === id) el.style.display = (el.style.display === 'none' || el.style.display === '') ? (s==='trophyList'?'flex':'block') : 'none';
            else el.style.display = 'none';
        });
    };

    window.saveProfileData = async () => {
        const nick = document.getElementById('profNick').value;
        if(!nick) return alert("Введите ник");
        await setDoc(doc(db, "users", userUid), { username: nick }, { merge: true });
        alert("Сохранено!");
        loadData();
    };

    async function loadData() {
        const snap = await getDoc(doc(db, "users", userUid));
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById('userName').innerText = d.username || "Игрок";
            document.getElementById('profNick').value = d.username || "";
            const icon = await getImg("main_icon");
            const list = await getImg("html_list");
            updateUI(d.game, d.perc, d.stat, icon, list);
        }
    }

    async function loadLeaderboard() {
        const list = document.getElementById('leaderboardList');
        const q = query(collection(db, "users"), orderBy("perc", "desc"), limit(10));
        const snap = await getDocs(q);
        let html = "";
        snap.forEach(u => {
            const data = u.data();
            html += `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                <span>${data.username || 'Аноним'}</span>
                <b>${data.perc || 0}%</b>
            </div>`;
        });
        list.innerHTML = html || "Пусто";
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !userUid) return;
        const zip = await JSZip.loadAsync(file);
        let xmlData = null, icons = {};

        for (let path in zip.files) {
            const name = path.split('/').pop().toUpperCase();
            if (name === 'TROP.XML') xmlData = await zip.files[path].async("string");
            if (name.endsWith('.PNG')) icons[name] = "data:image/png;base64," + await zip.files[path].async("base64");
        }

        if (xmlData) {
            const xml = new DOMParser().parseFromString(xmlData, "text/xml");
            const trophies = xml.querySelectorAll('trophy');
            let earned = 0, tHtml = "";

            trophies.forEach(t => {
                const won = t.getAttribute('unlockstate') === "true";
                if(won) earned++;
                const tid = String(t.getAttribute('id')).padStart(3, '0');
                const img = icons[`TROP${tid}.PNG`] || "";
                
                // Фильтр и цвет полоски
                const imgStyle = won ? "filter: grayscale(0); opacity: 1;" : "filter: grayscale(1); opacity: 0.4;";
                const barColor = won ? "var(--green)" : "#333";

                tHtml += `
                <div class="trophy-item">
                    <img src="${img}" class="trophy-icon" style="${imgStyle}">
                    <div style="flex-grow:1;">
                        <b style="font-size:13px; color:${won?'#fff':'#888'}">${t.querySelector('name').textContent}</b><br>
                        <small style="font-size:11px; color:#666">${t.querySelector('detail').textContent}</small>
                    </div>
                    <div class="trophy-bar" style="background:${barColor};"></div>
                </div>`;
            });

            const p = Math.round((earned / trophies.length) * 100);
            const title = xml.querySelector('title-name')?.textContent || "Игра";
            
            await saveImg("main_icon", icons['TROP000.PNG'] || "");
            await saveImg("html_list", tHtml);
            await setDoc(doc(db, "users", userUid), { game: title, perc: p, stat: `${earned}/${trophies.length}` }, { merge: true });
            loadData();
        }
    });

    function updateUI(title, p, st, img, listHtml) {
        if(!title) return;
        document.getElementById('gameTitle').innerText = title;
        document.getElementById('progressFill').style.width = p + "%";
        document.getElementById('statText').innerText = `${p}% — Трофеи: ${st}`;
        if (img) {
            document.getElementById('gameIcon').src = img;
            document.getElementById('gameIcon').style.display = 'block';
            document.getElementById('mainBanner').style.backgroundImage = `url(${img})`;
        }
        if (listHtml) document.getElementById('trophyList').innerHTML = listHtml;
    }
</script>
</body>
</html>
