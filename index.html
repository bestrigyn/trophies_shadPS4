<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trophy Tracker shadps4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --ps-blue: #00439c; --ps-light-blue: #00aaff; --bg-dark: #0a0a0a; --text-main: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px; }
        .login-btn { background: #4caf50; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; }
        .upload-zone { text-align: center; margin-bottom: 40px; }
        .btn-upload { background: var(--ps-blue); color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; }
        #fileInput { display: none; }
        .game-banner { 
            background: linear-gradient(135deg, #001f4d 0%, #00439c 100%); 
            width: 100%; max-width: 1000px; margin: 0 auto; border-radius: 12px; 
            padding: 25px; display: flex; gap: 20px; align-items: center; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .game-icon { width: 120px; height: 120px; border-radius: 10px; object-fit: cover; background: #000; }
        .progress-line-container { width: 100%; height: 10px; background: rgba(0,0,0,0.3); border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-line-fill { height: 100%; background: #00aaff; transition: 1s; }
        #trophySection { max-width: 1000px; margin: 20px auto; display: none; }
        .trophy-row { background: #1a1a1a; margin-bottom: 6px; padding: 15px; display: flex; align-items: center; gap: 20px; border-radius: 8px; border-left: 5px solid #333; }
        .unlocked { border-left: 5px solid #4caf50; background: #1e251e; }
        .t-icon { width: 50px; height: 50px; border-radius: 5px; background: #000; }
    </style>
</head>
<body>

    <div class="top-nav">
        <h2>🏆 Trophy Tracker shadps4</h2>
        <button id="authBtn" class="login-btn" onclick="handleAuthClick()">Войти</button>
    </div>

    <div class="upload-zone">
        <label for="fileInput" class="btn-upload">📥 Загрузить Update.zip</label>
        <input type="file" id="fileInput" accept=".zip">
    </div>

    <div id="mainContent"></div>
    <div id="trophySection"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
            authDomain: "bestrigyn-1d1c5.firebaseapp.com",
            projectId: "bestrigyn-1d1c5",
            storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
            messagingSenderId: "967145662050",
            appId: "1:967145662050:web:c03ed7463c51105d7bd33b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userUid = null;

        window.handleAuthClick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUid = user.uid;
                document.getElementById('authBtn').innerText = user.displayName;
                loadData();
            }
        });

        // ЗАГРУЗКА ИЗ ОБЛАКА
        async function loadData() {
            if (!userUid) return;
            const snap = await getDoc(doc(db, "users", userUid));
            if (snap.exists()) {
                const d = snap.data();
                renderUI(d.game, d.perc, d.stat, d.imgBase64, d.fullHtml);
            }
        }

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const zip = await JSZip.loadAsync(file);
            let xml = null, icons = {}, mainIconBase64 = "";

            for (let p in zip.files) {
                if (p.toLowerCase().endsWith('trop.xml')) xml = await zip.files[p].async("string");
                if (p.toLowerCase().endsWith('.png')) {
                    const b = await zip.files[p].async("base64");
                    const name = p.split('/').pop().toUpperCase();
                    icons[name] = "data:image/png;base64," + b;
                    if (name === 'TROP000.PNG') mainIconBase64 = icons[name];
                }
            }
            if (xml) processXml(xml, icons, mainIconBase64);
        });

        async function processXml(xmlStr, icons, mainIconBase64) {
            const docXml = new DOMParser().parseFromString(xmlStr, "text/xml");
            const title = docXml.querySelector('title-name')?.textContent || "Game";
            const trops = docXml.querySelectorAll('trophy');
            let win = 0, html = '';

            trops.forEach(t => {
                const isW = t.getAttribute('unlockstate') === "true";
                if (isW) win++;
                const id = 'TROP' + String(t.getAttribute('id')).padStart(3, '0') + '.PNG';
                html += `<div class="trophy-row ${isW ? 'unlocked' : ''}">
                    <img src="${icons[id] || ''}" class="t-icon">
                    <div><h4>${t.querySelector('name').textContent}</h4><p>${t.querySelector('detail').textContent}</p></div>
                </div>`;
            });

            const p = Math.round((win / trops.length) * 100);
            const statStr = `${win}/${trops.length}`;

            // СОХРАНЯЕМ ВСЁ В БАЗУ, ВКЛЮЧАЯ ГОТОВЫЙ HTML
            if (userUid) {
                await setDoc(doc(db, "users", userUid), { 
                    game: title, perc: p, stat: statStr, 
                    imgBase64: mainIconBase64, fullHtml: html 
                });
            }
            renderUI(title, p, statStr, mainIconBase64, html);
        }

        function renderUI(title, p, stat, icon, html) {
            document.getElementById('mainContent').innerHTML = `
                <div class="game-banner" onclick="toggleTrophies()">
                    <img src="${icon}" class="game-icon">
                    <div class="game-info">
                        <h2 style="margin:0;">${title}</h2>
                        <div class="progress-line-container"><div class="progress-line-fill" style="width:${p}%"></div></div>
                        <strong>${p}% — Трофеи: ${stat}</strong>
                    </div>
                </div>`;
            document.getElementById('trophySection').innerHTML = html;
        }

        window.toggleTrophies = () => {
            const s = document.getElementById('trophySection');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        };
    </script>
</body>
</html>
