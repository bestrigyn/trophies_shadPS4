<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Trophy Tracker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --ps-blue: #00439c; --bg: #0a0a0a; --card: #161616; --green: #4caf50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* ШАПКА */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px 25px; border-radius: 12px; border: 1px solid #333; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        
        /* ПЛАШКА ССЫЛКИ НА ПК-ВЕРСИЮ */
        .pc-download { 
            background: #1a1a1a; 
            border: 1px dashed #00aaff; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            margin-bottom: 35px; /* Хороший отступ до кнопки */
            font-size: 14px;
        }
        .pc-download a { color: #00aaff; text-decoration: none; font-weight: bold; border-bottom: 1px solid #00aaff; transition: 0.3s; }
        .pc-download a:hover { color: #fff; border-bottom-color: #fff; }

        /* КНОПКА ЗАГРУЗКИ */
        .upload-wrapper { 
            text-align: center; 
            margin-bottom: 40px; /* ВОТ ЭТОТ ОТСТУП уберет слипание с баннером майонеза */
        }

        .btn { background: var(--ps-blue); color: #fff; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-block; }
        .btn:hover { opacity: 0.8; }
        .btn-logout { background: #d32f2f; font-size: 12px; padding: 5px 10px; }

        /* БАННЕР ТРОФЕЕВ */
        .banner { 
            background: linear-gradient(135deg, #001f4d, #00439c); 
            padding: 25px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            cursor: pointer; 
            border: 1px solid #0056cc; 
            position: relative; 
            overflow: hidden;
            margin-top: 10px; /* Дополнительный зазор сверху */
        }
        .game-icon { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; z-index: 2; background: #000; border: 2px solid rgba(255,255,255,0.1); }
        .progress-box { flex-grow: 1; z-index: 2; }
        .bar { width: 100%; height: 12px; background: rgba(0,0,0,0.4); border-radius: 6px; margin: 12px 0; overflow: hidden; }
        .fill { height: 100%; background: #00aaff; transition: 1.5s cubic-bezier(0.1, 0.7, 0.1, 1); }

        /* СПИСОК */
        #trophyList { margin-top: 20px; display: none; flex-direction: column; gap: 8px; }
        .t-card { background: var(--card); padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 20px; border-left: 6px solid #444; transition: 0.2s; }
        .t-card.won { border-left-color: var(--green); background: #1b241b; }
        .t-img { width: 54px; height: 54px; border-radius: 4px; background: #000; }
        .t-info b { display: block; font-size: 16px; margin-bottom: 2px; }
        .t-info small { color: #aaa; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-info">
            <h2 style="margin:0;">🏆 Trophy Tracker</h2>
            <span id="userName" style="color: var(--green); font-weight: bold;"></span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="authBtn" class="btn" onclick="handleAuthClick()">Войти</button>
            <button id="logoutBtn" class="btn btn-logout" style="display:none;" onclick="handleLogout()">Выйти</button>
        </div>
    </div>

    <div class="pc-download">
        Хотите обновлять трофеи на ПК? 
        <br>
        <a href="https://github.com/bestrigyn/trophies_shadPS4_assistant/releases/tag/ShadPS4_Assistant" target="_self">
            Скачать утилиту ShadPS4 Assistant
        </a>
    </div>

    <div class="upload-wrapper">
        <label class="btn">
            📂 Загрузить Update.zip 
            <input type="file" id="fileInput" accept=".zip" hidden>
        </label>
    </div>

    <div class="banner" id="mainBanner">
        <img id="gameIcon" src="" class="game-icon" style="display:none">
        <div class="progress-box">
            <h2 id="gameTitle" style="margin:0">Ожидание загрузки...</h2>
            <div class="bar"><div id="progressFill" class="fill" style="width: 0%"></div></div>
            <span id="statText">Войдите и выберите файл архива</span>
        </div>
    </div>

    <div id="trophyList"></div>
</div>

<script type="module">
    // Твой JS код остается без изменений, он работает отлично
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
        authDomain: "bestrigyn-1d1c5.firebaseapp.com",
        projectId: "bestrigyn-1d1c5",
        storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
        messagingSenderId: "967145662050",
        appId: "1:967145662050:web:c03ed7463c51105d7bd33b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let userUid = null;

    const openDB = () => {
        return new Promise((res) => {
            const req = indexedDB.open("TrophyCache", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("images");
            req.onsuccess = () => res(req.result);
        });
    };

    const saveImg = async (id, data) => {
        const idb = await openDB();
        idb.transaction("images", "readwrite").objectStore("images").put(data, id);
    };

    const getImg = async (id) => {
        const idb = await openDB();
        return new Promise(res => {
            const req = idb.transaction("images").objectStore("images").get(id);
            req.onsuccess = () => res(req.result);
        });
    };

    window.handleAuthClick = () => signInWithPopup(auth, new GoogleAuthProvider());
    window.handleLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUid = user.uid;
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            loadData();
        }
    });

    async function loadData() {
        if (!userUid) return;
        const snap = await getDoc(doc(db, "users", userUid));
        if (snap.exists()) {
            const d = snap.data();
            const cachedIcon = await getImg("main_icon");
            const cachedList = await getImg("html_list");
            updateUI(d.game, d.perc, d.stat, cachedIcon, cachedList);
        }
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !userUid) return;
        const zip = await JSZip.loadAsync(file);
        let xmlData = null, icons = {};
        for (let path in zip.files) {
            const name = path.split('/').pop().toUpperCase();
            if (name === 'TROP.XML') xmlData = await zip.files[path].async("string");
            if (name.endsWith('.PNG')) {
                icons[name] = "data:image/png;base64," + await zip.files[path].async("base64");
            }
        }
        if (xmlData) {
            const xml = new DOMParser().parseFromString(xmlData, "text/xml");
            const title = xml.querySelector('title-name')?.textContent || "Game";
            const trophies = xml.querySelectorAll('trophy');
            let earned = 0, html = '';
            trophies.forEach(t => {
                const won = t.getAttribute('unlockstate') === "true";
                if (won) earned++;
                const img = icons['TROP' + String(t.getAttribute('id')).padStart(3, '0') + '.PNG'] || "";
                html += `<div class="t-card ${won ? 'won' : ''}"><img src="${img}" class="t-img"><div class="t-info"><b>${t.querySelector('name').textContent}</b><small>${t.querySelector('detail').textContent}</small></div></div>`;
            });
            const p = Math.round((earned / trophies.length) * 100);
            const st = `${earned}/${trophies.length}`;
            const mainIcon = icons['TROP000.PNG'] || "";
            await saveImg("main_icon", mainIcon);
            await saveImg("html_list", html);
            await setDoc(doc(db, "users", userUid), { game: title, perc: p, stat: st });
            updateUI(title, p, st, mainIcon, html);
        }
    });

    function updateUI(title, p, st, img, html) {
        document.getElementById('gameTitle').innerText = title;
        document.getElementById('progressFill').style.width = p + "%";
        document.getElementById('statText').innerText = `${p}% — Трофеи: ${st}`;
        if (img) {
            const icon = document.getElementById('gameIcon');
            icon.src = img;
            icon.style.display = 'block';
        }
        document.getElementById('trophyList').innerHTML = html || "Список пуст";
    }

    document.getElementById('mainBanner').onclick = () => {
        const list = document.getElementById('trophyList');
        list.style.display = list.style.display === 'flex' ? 'none' : 'flex';
    };
</script>
</body>
</html>
