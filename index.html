<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Trophy Tracker v3 — No-Lag Method</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --ps-blue: #00439c; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 10px; }
        .btn { background: var(--ps-blue); color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .banner { background: linear-gradient(135deg, #001f4d, #00439c); padding: 25px; border-radius: 15px; display: flex; align-items: center; gap: 20px; cursor: pointer; transition: 0.3s; }
        .banner:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .game-icon { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .progress-box { flex-grow: 1; }
        .bar { width: 100%; height: 10px; background: rgba(0,0,0,0.3); border-radius: 5px; margin: 10px 0; }
        .fill { height: 100%; background: #00aaff; border-radius: 5px; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        #trophyList { margin-top: 20px; display: none; grid-template-columns: 1fr; gap: 10px; }
        .t-card { background: var(--card); padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 15px; border-left: 5px solid #333; }
        .t-card.won { border-left-color: #4caf50; background: #1b241b; }
        .t-img { width: 50px; height: 50px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <button id="authBtn" class="btn" onclick="handleAuthClick()">Войти в PSN (Google)</button>
        <label class="btn">📁 Выбрать ZIP <input type="file" id="fileInput" accept=".zip" hidden></label>
    </div>

    <div class="banner" id="mainBanner">
        <img id="gameIcon" src="" class="game-icon" style="display:none">
        <div class="progress-box">
            <h2 id="gameTitle" style="margin:0">Загрузите ZIP файл</h2>
            <div class="bar"><div id="progressFill" class="fill" style="width: 0%"></div></div>
            <span id="statText">0% — 0/0 трофеев</span>
        </div>
    </div>

    <div id="trophyList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqIXZYcIST9QAD72WzgapVJtWfiEj0lqI",
        authDomain: "bestrigyn-1d1c5.firebaseapp.com",
        projectId: "bestrigyn-1d1c5",
        storageBucket: "bestrigyn-1d1c5.firebasestorage.app",
        messagingSenderId: "967145662050",
        appId: "1:967145662050:web:c03ed7463c51105d7bd33b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let userUid = null;

    window.handleAuthClick = () => signInWithPopup(auth, new GoogleAuthProvider());

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userUid = user.uid;
            document.getElementById('authBtn').innerText = user.displayName;
            loadStats(); 
        }
    });

    // Загружаем ТОЛЬКО текст из базы
    async function loadStats() {
        if (!userUid) return;
        const snap = await getDoc(doc(db, "users", userUid));
        if (snap.exists()) {
            const d = snap.data();
            // Показываем старые цифры, пока пользователь не загрузил новый ZIP для картинок
            document.getElementById('gameTitle').innerText = d.game + " (Загрузите ZIP для иконок)";
            document.getElementById('progressFill').style.width = d.perc + "%";
            document.getElementById('statText').innerText = `${d.perc}% — ${d.stat}`;
        }
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !userUid) return;

        const zip = await JSZip.loadAsync(file);
        let xmlData = null, icons = {};

        // Быстро вытаскиваем всё из ZIP
        for (let path in zip.files) {
            const name = path.split('/').pop().toUpperCase();
            if (name === 'TROP.XML') xmlData = await zip.files[path].async("string");
            if (name.endsWith('.PNG')) {
                icons[name] = URL.createObjectURL(new Blob([await zip.files[path].async("blob")], {type: 'image/png'}));
            }
        }

        if (xmlData) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlData, "text/xml");
            const title = xml.querySelector('title-name')?.textContent || "Unknown Game";
            const trophies = xml.querySelectorAll('trophy');
            
            let earned = 0, listHtml = '';

            trophies.forEach(t => {
                const isWon = t.getAttribute('unlockstate') === "true";
                if (isWon) earned++;
                const imgName = 'TROP' + String(t.getAttribute('id')).padStart(3, '0') + '.PNG';
                
                listHtml += `
                    <div class="t-card ${isWon ? 'won' : ''}">
                        <img src="${icons[imgName] || ''}" class="t-img">
                        <div>
                            <div style="font-weight:bold">${t.querySelector('name').textContent}</div>
                            <div style="font-size:13px; opacity:0.7">${t.querySelector('detail').textContent}</div>
                        </div>
                    </div>`;
            });

            const percent = Math.round((earned / trophies.length) * 100);
            const stats = `${earned}/${trophies.length} трофеев`;

            // Обновляем экран
            document.getElementById('gameTitle').innerText = title;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('statText').innerText = `${percent}% — ${stats}`;
            document.getElementById('gameIcon').src = icons['TROP000.PNG'];
            document.getElementById('gameIcon').style.display = 'block';
            document.getElementById('trophyList').innerHTML = listHtml;

            // СОХРАНЯЕМ В БАЗУ ТОЛЬКО ТЕКСТ (Чтобы не было тормозов)
            await setDoc(doc(db, "users", userUid), {
                game: title,
                perc: percent,
                stat: stats
            });
            
            console.log("Статистика сохранена в облако!");
        }
    });

    document.getElementById('mainBanner').onclick = () => {
        const list = document.getElementById('trophyList');
        list.style.display = list.style.display === 'grid' ? 'none' : 'grid';
    };
</script>

</body>
</html>
